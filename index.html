    function showImage() {
      const id = document.getElementById("studentId").value.trim();
      const container = document.getElementById("imageContainer");
      container.innerHTML = "";

      const entry = imageMap[id];
      if (!entry) {
        container.innerHTML = "<p style='color:red;'>❌ ID not found</p>";
        return;
      }

      const baseUrl = `https://qrlogger.github.io/student-cards`;
      const imgUrl = `${baseUrl}/${entry.filename}.png`;
      const pdfUrl = `${baseUrl}/${entry.filename}.pdf`;

      // Embed using Google Docs viewer and download
      const viewerUrl = `https://docs.google.com/gview?url=${encodeURIComponent(pdfUrl)}&embedded=true`;

      container.innerHTML = `
        <h3>${entry.name}</h3>
        <img src="${imgUrl}" alt="QR Code for ${entry.name}">
        <br><br>
        <iframe src="${viewerUrl}" width="100%" height="500px" frameborder="0"></iframe>
        <a id="pdfDownload" href="${pdfUrl}" download style="display: none;"></a>
      `;

      // Trigger PDF download automatically
      setTimeout(() => {
        document.getElementById("pdfDownload").click();
      }, 1000);
    }
